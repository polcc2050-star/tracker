<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Olisal — Calisthenics</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none}
  input{outline:none;font-family:inherit}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const EXERCISES=["Push-ups","Dips","Squats","Muscle-ups"];
const A="#00ff87",DARK="#0a0a0a",CARD="#141414",CARD2="#1c1c1c",BORDER="#252525";

function useStorage(key,def){
  const[val,setVal]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}},[key,val]);
  return[val,setVal];
}

function RestTimer({onClose}){
  const[secs,setSecs]=useState(90);
  const[running,setRunning]=useState(false);
  const[input,setInput]=useState(90);
  const ref=useRef();
  useEffect(()=>{
    if(running){ref.current=setInterval(()=>setSecs(s=>{if(s<=1){clearInterval(ref.current);setRunning(false);return 0;}return s-1;}),1000);}
    else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[running]);
  const reset=()=>{setRunning(false);setSecs(input);};
  const pct=(secs/input)*100,r=54,circ=2*Math.PI*r;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:20,padding:36,width:280,textAlign:"center"}}>
        <div style={{color:"#666",marginBottom:16,fontSize:12,letterSpacing:2}}>REST TIMER</div>
        <svg width={130} height={130} style={{margin:"0 auto 16px"}}>
          <circle cx={65} cy={65} r={r} fill="none" stroke={BORDER} strokeWidth={8}/>
          <circle cx={65} cy={65} r={r} fill="none" stroke={A} strokeWidth={8} strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round" transform="rotate(-90 65 65)" style={{transition:"stroke-dashoffset .5s"}}/>
          <text x={65} y={72} textAnchor="middle" fill="#fff" fontSize={28} fontWeight="bold">{Math.floor(secs/60)}:{String(secs%60).padStart(2,"0")}</text>
        </svg>
        <div style={{display:"flex",gap:8,marginBottom:16,justifyContent:"center"}}>
          {[30,60,90,120].map(t=>(
            <button key={t} onClick={()=>{setInput(t);setSecs(t);setRunning(false);}} style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${input===t?A:BORDER}`,background:input===t?"rgba(0,255,135,.1)":"transparent",color:input===t?A:"#666",fontSize:13}}>{t}s</button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <button onClick={()=>setRunning(r=>!r)} style={{flex:1,padding:"12px 0",borderRadius:12,border:"none",background:A,color:DARK,fontWeight:"bold",fontSize:15}}>{running?"Pause":"Start"}</button>
          <button onClick={reset} style={{flex:1,padding:"12px 0",borderRadius:12,border:`1px solid ${BORDER}`,background:"transparent",color:"#666"}}>Reset</button>
        </div>
        <button onClick={onClose} style={{color:"#444",background:"none",border:"none",fontSize:13}}>Close</button>
      </div>
    </div>
  );
}

function WorkoutLog({exercises,onAdd}){
  const[ex,setEx]=useState(exercises[0]);
  const[sets,setSets]=useState([{reps:"",weight:"",done:false}]);
  const[showTimer,setShowTimer]=useState(false);
  const addSet=()=>setSets(s=>[...s,{reps:"",weight:"",done:false}]);
  const removeSet=i=>setSets(s=>s.filter((_,idx)=>idx!==i));
  const upd=(i,f,v)=>setSets(s=>s.map((r,idx)=>idx===i?{...r,[f]:v}:r));
  const toggleDone=i=>setSets(s=>s.map((r,idx)=>idx===i?{...r,done:!r.done}:r));
  const save=()=>{
    const valid=sets.filter(s=>s.reps>0);
    if(!valid.length)return;
    onAdd({id:Date.now(),date:new Date().toISOString(),exercise:ex,sets:valid.map(s=>({reps:+s.reps,weight:+s.weight||0,done:s.done}))});
    setSets([{reps:"",weight:"",done:false}]);
  };
  const doneCount=sets.filter(s=>s.done).length;
  return(
    <div>
      {showTimer&&<RestTimer onClose={()=>setShowTimer(false)}/>}
      <h2 style={{color:"#fff",marginBottom:20,fontSize:18}}>Log Workout</h2>
      <div style={{marginBottom:16}}>
        <div style={{color:"#555",fontSize:11,letterSpacing:2,marginBottom:8}}>EXERCISE</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {exercises.map(e=>(
            <button key={e} onClick={()=>setEx(e)} style={{padding:"8px 16px",borderRadius:20,border:`1px solid ${ex===e?A:BORDER}`,background:ex===e?"rgba(0,255,135,.1)":"transparent",color:ex===e?A:"#666",fontSize:13}}>{e}</button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{color:"#555",fontSize:11,letterSpacing:2}}>SETS</div>
            {doneCount>0&&<div style={{background:"rgba(0,255,135,.1)",border:"1px solid rgba(0,255,135,.3)",borderRadius:20,padding:"2px 10px",color:A,fontSize:11}}>{doneCount}/{sets.length} done</div>}
          </div>
          <button onClick={()=>setShowTimer(true)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${BORDER}`,background:"transparent",color:A,fontSize:12}}>⏱ Rest Timer</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"36px 1fr 1fr 44px",gap:8,marginBottom:8}}>
          {["#","REPS","KG","DONE"].map(h=><div key={h} style={{color:"#444",fontSize:11,textAlign:"center"}}>{h}</div>)}
        </div>
        {sets.map((s,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"36px 1fr 1fr 44px",gap:8,marginBottom:8,alignItems:"center"}}>
            <div style={{color:s.done?A:"#444",textAlign:"center",fontWeight:"bold",fontSize:14}}>{i+1}</div>
            <input value={s.reps} onChange={e=>upd(i,"reps",e.target.value)} type="number" min="0" placeholder="0" style={{padding:"10px 0",borderRadius:10,border:`1px solid ${s.done?"rgba(0,255,135,.3)":BORDER}`,background:s.done?"rgba(0,255,135,.06)":CARD2,color:s.done?A:"#fff",textAlign:"center",fontSize:16,width:"100%"}}/>
            <input value={s.weight} onChange={e=>upd(i,"weight",e.target.value)} type="number" min="0" placeholder="BW" style={{padding:"10px 0",borderRadius:10,border:`1px solid ${s.done?"rgba(0,255,135,.3)":BORDER}`,background:s.done?"rgba(0,255,135,.06)":CARD2,color:s.done?A:"#fff",textAlign:"center",fontSize:16,width:"100%"}}/>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
              <div onClick={()=>toggleDone(i)} style={{width:26,height:26,borderRadius:8,border:`2px solid ${s.done?A:BORDER}`,background:s.done?A:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {s.done&&<span style={{color:DARK,fontSize:13,fontWeight:"bold"}}>✓</span>}
              </div>
              <button onClick={()=>removeSet(i)} style={{background:"none",border:"none",color:"#333",fontSize:15,padding:0}}>✕</button>
            </div>
          </div>
        ))}
        <button onClick={addSet} style={{width:"100%",padding:"10px 0",borderRadius:10,border:`1px dashed ${BORDER}`,background:"transparent",color:"#444",marginTop:4,fontSize:14}}>+ Add Set</button>
      </div>
      <button onClick={save} style={{width:"100%",padding:"14px 0",borderRadius:14,border:"none",background:A,color:DARK,fontWeight:"bold",fontSize:16}}>Save Workout</button>
    </div>
  );
}

function CalendarHistory({history,exercises,onDelete}){
  const now=new Date();
  const[year,setYear]=useState(now.getFullYear());
  const[month,setMonth]=useState(now.getMonth());
  const[selDay,setSelDay]=useState(null);
  const wDays={};
  history.forEach(w=>{const d=new Date(w.date),k=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;if(!wDays[k])wDays[k]=[];wDays[k].push(w);});
  const firstDay=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate();
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS=["Su","Mo","Tu","We","Th","Fr","Sa"];
  const prev=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);setSelDay(null);};
  const next=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);setSelDay(null);};
  const selKey=selDay?`${year}-${month}-${selDay}`:null;
  const selW=selKey?(wDays[selKey]||[]):[];
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  return(
    <div>
      <h2 style={{color:"#fff",marginBottom:16,fontSize:18}}>Workout Calendar</h2>
      <div style={{background:CARD2,borderRadius:16,padding:16,border:`1px solid ${BORDER}`,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <button onClick={prev} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:8,color:"#888",padding:"4px 12px",fontSize:18}}>‹</button>
          <div style={{color:"#fff",fontWeight:"bold",fontSize:15}}>{MONTHS[month]} {year}</div>
          <button onClick={next} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:8,color:"#888",padding:"4px 12px",fontSize:18}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",color:"#444",fontSize:11,fontWeight:"bold",paddingBottom:4}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {cells.map((d,i)=>{
            if(!d)return<div key={`e${i}`}/>;
            const k=`${year}-${month}-${d}`,has=!!wDays[k],isToday=d===now.getDate()&&month===now.getMonth()&&year===now.getFullYear(),isSel=d===selDay;
            return(
              <div key={d} onClick={()=>setSelDay(d===selDay?null:d)} style={{aspectRatio:"1",borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",border:`1px solid ${isSel?A:isToday?"rgba(0,255,135,.3)":BORDER}`,background:isSel?"rgba(0,255,135,.15)":has?"rgba(0,255,135,.04)":"transparent"}}>
                <span style={{fontSize:13,color:isSel?A:isToday?A:"#aaa",fontWeight:isToday||isSel?"bold":"normal"}}>{d}</span>
                {has&&<div style={{position:"absolute",bottom:4,left:"50%",transform:"translateX(-50%)",width:5,height:5,borderRadius:"50%",background:A}}/>}
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:12}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:A}}/>
          <span style={{color:"#444",fontSize:11}}>Workout logged</span>
        </div>
      </div>
      {selDay&&(
        <div>
          <div style={{color:"#555",fontSize:12,letterSpacing:2,marginBottom:10}}>{MONTHS[month].toUpperCase()} {selDay}</div>
          {selW.length===0?<div style={{color:"#444",textAlign:"center",padding:24,background:CARD2,borderRadius:14,border:`1px solid ${BORDER}`}}>No workouts on this day</div>:selW.map(w=>(
            <div key={w.id} style={{background:CARD2,borderRadius:14,padding:16,marginBottom:12,border:`1px solid ${BORDER}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{color:A,fontWeight:"bold",fontSize:15}}>{w.exercise}</div>
                <button onClick={()=>onDelete(w.id)} style={{background:"none",border:"none",color:"#333",fontSize:16}}>🗑</button>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {w.sets.map((s,i)=>(
                  <div key={i} style={{background:s.done?"rgba(0,255,135,.08)":CARD,borderRadius:8,padding:"6px 12px",border:`1px solid ${s.done?"rgba(0,255,135,.25)":BORDER}`,display:"flex",alignItems:"center",gap:6}}>
                    {s.done&&<span style={{color:A,fontSize:11}}>✓</span>}
                    <span style={{color:"#666",fontSize:12}}>Set {i+1}: </span>
                    <span style={{color:s.done?A:"#fff",fontSize:13,fontWeight:"bold"}}>{s.reps} reps</span>
                    {s.weight>0&&<span style={{color:"#555",fontSize:12}}>@ {s.weight}kg</span>}
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function PresetsView({presets,exercises,onSave,onDelete,onLoad}){
  const[mode,setMode]=useState("list");
  const[name,setName]=useState("");
  const[sel,setSel]=useState([]);
  const toggle=ex=>setSel(s=>s.includes(ex)?s.filter(e=>e!==ex):[...s,ex]);
  const save=()=>{if(!name.trim()||!sel.length)return;onSave({id:Date.now(),name:name.trim(),exercises:sel});setName("");setSel([]);setMode("list");};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{color:"#fff",fontSize:18,margin:0}}>Workout Presets</h2>
        {mode==="list"&&<button onClick={()=>setMode("create")} style={{padding:"7px 16px",borderRadius:20,border:`1px solid ${A}`,background:"rgba(0,255,135,.08)",color:A,fontSize:13}}>+ New Preset</button>}
      </div>
      {mode==="create"?(
        <div style={{background:CARD2,borderRadius:16,padding:20,border:`1px solid ${BORDER}`}}>
          <div style={{color:"#555",fontSize:11,letterSpacing:2,marginBottom:8}}>PRESET NAME</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Upper Body Day" style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1px solid ${BORDER}`,background:DARK,color:"#fff",fontSize:15,marginBottom:16}}/>
          <div style={{color:"#555",fontSize:11,letterSpacing:2,marginBottom:10}}>SELECT EXERCISES</div>
          {exercises.map(ex=>(
            <div key={ex} onClick={()=>toggle(ex)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:10,border:`1px solid ${sel.includes(ex)?A:BORDER}`,background:sel.includes(ex)?"rgba(0,255,135,.06)":DARK,marginBottom:8,cursor:"pointer"}}>
              <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${sel.includes(ex)?A:BORDER}`,background:sel.includes(ex)?A:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {sel.includes(ex)&&<span style={{color:DARK,fontSize:12,fontWeight:"bold"}}>✓</span>}
              </div>
              <span style={{color:sel.includes(ex)?A:"#777",fontSize:15}}>{ex}</span>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button onClick={save} style={{flex:1,padding:"12px 0",borderRadius:12,border:"none",background:A,color:DARK,fontWeight:"bold"}}>Save Preset</button>
            <button onClick={()=>setMode("list")} style={{flex:1,padding:"12px 0",borderRadius:12,border:`1px solid ${BORDER}`,background:"transparent",color:"#666"}}>Cancel</button>
          </div>
        </div>
      ):presets.length===0?<div style={{color:"#444",textAlign:"center",padding:40}}>No presets yet. Create one!</div>:presets.map(p=>(
        <div key={p.id} style={{background:CARD2,borderRadius:14,padding:16,marginBottom:12,border:`1px solid ${BORDER}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{color:"#fff",fontWeight:"bold",fontSize:16}}>{p.name}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>onLoad(p)} style={{padding:"5px 14px",borderRadius:20,border:"none",background:A,color:DARK,fontWeight:"bold",fontSize:12}}>Load</button>
              <button onClick={()=>onDelete(p.id)} style={{background:"none",border:"none",color:"#333",fontSize:16}}>🗑</button>
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {p.exercises.map(ex=><span key={ex} style={{padding:"3px 10px",borderRadius:20,background:"rgba(0,255,135,.06)",border:"1px solid rgba(0,255,135,.15)",color:A,fontSize:12}}>{ex}</span>)}
          </div>
        </div>
      ))}
    </div>
  );
}

function PRBoard({history,exercises}){
  const prs={};
  exercises.forEach(ex=>{prs[ex]={reps:0,weight:0};});
  history.forEach(w=>w.sets.forEach(s=>{if(!prs[w.exercise])prs[w.exercise]={reps:0,weight:0};if(s.reps>prs[w.exercise].reps)prs[w.exercise].reps=s.reps;if((s.weight||0)>prs[w.exercise].weight)prs[w.exercise].weight=s.weight||0;}));
  return(
    <div>
      <h2 style={{color:"#fff",marginBottom:20,fontSize:18}}>Personal Records</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {Object.entries(prs).map(([ex,pr])=>(
          <div key={ex} style={{background:CARD2,borderRadius:14,padding:16,border:`1px solid ${BORDER}`}}>
            <div style={{color:A,fontSize:11,fontWeight:"bold",marginBottom:8,letterSpacing:1}}>{ex.toUpperCase()}</div>
            <div style={{color:"#fff",fontSize:22,fontWeight:"bold"}}>{pr.reps} <span style={{fontSize:13,color:"#555"}}>reps</span></div>
            {pr.weight>0&&<div style={{color:"#666",fontSize:14,marginTop:2}}>{pr.weight} kg</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function Chart({history,exercises}){
  const[sel,setSel]=useState(exercises[0]);
  const data=history.filter(w=>w.exercise===sel).map(w=>({date:new Date(w.date).toLocaleDateString("en",{month:"short",day:"numeric"}),maxReps:Math.max(...w.sets.map(s=>s.reps))})).slice(-10);
  const maxR=Math.max(...data.map(d=>d.maxReps),1);
  const W=320,H=160,PAD=30;
  return(
    <div>
      <h2 style={{color:"#fff",marginBottom:16,fontSize:18}}>Progress Charts</h2>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
        {exercises.map(ex=><button key={ex} onClick={()=>setSel(ex)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${sel===ex?A:BORDER}`,background:sel===ex?"rgba(0,255,135,.1)":"transparent",color:sel===ex?A:"#666",fontSize:13}}>{ex}</button>)}
      </div>
      {data.length<2?<div style={{color:"#444",textAlign:"center",padding:40}}>Log at least 2 sessions to see chart</div>:(
        <svg width="100%" viewBox={`0 0 ${W} ${H+PAD}`} style={{overflow:"visible"}}>
          {[0,.5,1].map(t=><line key={t} x1={PAD} y1={H*(1-t)} x2={W} y2={H*(1-t)} stroke={BORDER} strokeWidth={1}/>)}
          {data.map((d,i)=>{
            const x=PAD+(i/(data.length-1))*(W-PAD),y=H-(d.maxReps/maxR)*H*0.9;
            const nx=i<data.length-1?PAD+((i+1)/(data.length-1))*(W-PAD):null,ny=i<data.length-1?H-(data[i+1].maxReps/maxR)*H*0.9:null;
            return(<g key={i}>{nx&&<line x1={x} y1={y} x2={nx} y2={ny} stroke={A} strokeWidth={2}/>}<circle cx={x} cy={y} r={5} fill={A}/><text x={x} y={H+PAD-4} textAnchor="middle" fill="#444" fontSize={10}>{d.date}</text><text x={x} y={y-10} textAnchor="middle" fill="#888" fontSize={10}>{d.maxReps}</text></g>);
          })}
        </svg>
      )}
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("log");
  const[history,setHistory]=useStorage("cali_history",[]);
  const[presets,setPresets]=useStorage("cali_presets",[]);
  const[exercises]=useStorage("cali_exercises",EXERCISES);
  const[toast,setToast]=useState("");
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2000);};
  const addWorkout=w=>{setHistory(h=>[...h,w]);showToast("Workout saved! 💪");};
  const deleteWorkout=id=>setHistory(h=>h.filter(w=>w.id!==id));
  const savePreset=p=>{setPresets(ps=>[...ps,p]);showToast("Preset saved!");};
  const deletePreset=id=>setPresets(ps=>ps.filter(p=>p.id!==id));
  const loadPreset=p=>{showToast(`Loaded: ${p.name}`);setTab("log");};
  const tabs=[{id:"log",label:"Log",icon:"➕"},{id:"presets",label:"Presets",icon:"📋"},{id:"history",label:"Calendar",icon:"📅"},{id:"charts",label:"Charts",icon:"📈"},{id:"prs",label:"PRs",icon:"🏆"}];
  return(
    <div style={{minHeight:"100vh",background:DARK}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:A,color:DARK,padding:"10px 24px",borderRadius:30,fontWeight:"bold",zIndex:200,fontSize:14,whiteSpace:"nowrap"}}>{toast}</div>}
      <div style={{maxWidth:480,margin:"0 auto",paddingBottom:90}}>
        <div style={{padding:"40px 20px 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{color:A,fontSize:11,letterSpacing:3,fontWeight:"bold",marginBottom:4}}>CALISTHENICS</div>
              <h1 style={{margin:0,fontSize:26,fontWeight:"bold",color:"#fff"}}>Tracker</h1>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{color:"#444",fontSize:10,letterSpacing:2}}>ATHLETE</div>
              <div style={{color:A,fontWeight:"bold",fontSize:16,letterSpacing:1}}>Olisal</div>
            </div>
          </div>
        </div>
        <div style={{padding:"20px 20px 0"}}>
          {tab==="log"&&<WorkoutLog exercises={exercises} onAdd={addWorkout}/>}
          {tab==="presets"&&<PresetsView presets={presets} exercises={exercises} onSave={savePreset} onDelete={deletePreset} onLoad={loadPreset}/>}
          {tab==="history"&&<CalendarHistory history={history} exercises={exercises} onDelete={deleteWorkout}/>}
          {tab==="charts"&&<Chart history={history} exercises={exercises}/>}
          {tab==="prs"&&<PRBoard history={history} exercises={exercises}/>}
        </div>
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(10,10,10,.97)",backdropFilter:"blur(10px)",borderTop:`1px solid ${BORDER}`,display:"flex",justifyContent:"center"}}>
        <div style={{display:"flex",width:"100%",maxWidth:480}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 4px 10px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:18}}>{t.icon}</span>
              <span style={{fontSize:10,color:tab===t.id?A:"#444",fontWeight:tab===t.id?"bold":"normal"}}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
